<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kommo Dashboard</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Kommo Dashboard</h1>
      <p>Visão geral de leads, funil e vendedores</p>
    </header>

    <section class="filters">
      <div class="filter-group">
        <label for="start">Data inicial</label>
        <input type="date" id="start" />
      </div>
      <div class="filter-group">
        <label for="end">Data final</label>
        <input type="date" id="end" />
      </div>
      <button id="applyFilters">Aplicar filtros</button>
    </section>

    <section class="cards" id="summaryCards">
      <div class="card">
        <span>Total Leads</span>
        <strong id="cardTotal">0</strong>
      </div>
      <div class="card">
        <span>Respondeu 1ª mensagem</span>
        <strong id="cardReplied">0</strong>
      </div>
      <div class="card">
        <span>SQL</span>
        <strong id="cardSql">0</strong>
      </div>
      <div class="card">
        <span>Ganhos</span>
        <strong id="cardWon">0</strong>
      </div>
      <div class="card">
        <span>Perdidos</span>
        <strong id="cardLost">0</strong>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Vendedores</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Vendedor</th>
                <th>Leads</th>
                <th>SQL</th>
                <th>Ganhos</th>
                <th>Perdidos</th>
              </tr>
            </thead>
            <tbody id="sellersTable"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <h2>Origens</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Origem</th>
                <th>Leads</th>
              </tr>
            </thead>
            <tbody id="sourcesTable"></tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>Leads recentes</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Lead</th>
              <th>Vendedor</th>
              <th>Pipeline</th>
              <th>Status</th>
              <th>Campanha</th>
              <th>Carro</th>
              <th>Origem</th>
              <th>Criado em</th>
            </tr>
          </thead>
          <tbody id="leadsTable"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
